services:
  - type: web
    name: cafe-de-move-on
    runtime: node
    plan: free
    branch: main
    buildCommand: corepack enable && pnpm install --frozen-lockfile
    startCommand: pnpm start
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: 22.14.0
      - key: DATABASE_PATH
        value: /tmp/cafe-de-move-on.db
