[build]
  command = "pnpm install --frozen-lockfile && node scripts/build-netlify.mjs"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22.14.0"
  PNPM_VERSION = "11.7.0"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
